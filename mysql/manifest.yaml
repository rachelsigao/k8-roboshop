# Creating a secret to store the MySQL root password. The value is base64 encoded, where "Um9ib1Nob3BAMQ==" is the base64 encoding of "RoboShop@1".
apiVersion: v1
kind: Secret
metadata:
  name: mysql
  namespace: roboshop
  labels:
    component: mysql
    project: roboshop
    tier: database
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: "Um9ib1Nob3BAMQ=="
---

# Creating a deployment for MySQL, which will run a single replica of the MySQL container using a custom image rachelsigao/mysql:v1. The environment variable for the MySQL root password is sourced from the previously created secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # deployment labels
  labels:
    component: mysql
    project: roboshop
    tier: database
spec:
  replicas: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: mysql
      project: roboshop
      tier: database
  # This is pod definition
  template:
    metadata:
      labels:
        component: mysql
        project: roboshop
        tier: database
    spec:
      containers:
      - name: mysql
        image: rachelsigao/mysql:v1
        envFrom:
        - secretRef:
            name: mysql
---

# Creating a service to expose the MySQL database on port 3306, and it will route traffic to the pods with matching labels.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    component: mysql
    project: roboshop
    tier: database
spec:
  selector:
    component: mysql
    project: roboshop
    tier: database
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306 # container port