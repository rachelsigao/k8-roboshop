# Creating a config map to store environment variables for the payment application to connect to cart, user and rabbitmq services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
  labels:
    component: payment
    project: roboshop
    tier: app
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
---

# Creating a secret to store the default username and password for RabbitMQ. The values are base64 encoded, where "cm9ib3Nob3A=" is the base64 encoding of "roboshop" and "cm9ib3Nob3AxMjM=" is the base64 encoding of "roboshop123".
apiVersion: v1
kind: Secret
metadata:
  name: payment
  namespace: roboshop
  labels:
    component: payment
    project: roboshop
    tier: app
type: Opaque
data:
  AMQP_USER: "cm9ib3Nob3A="
  AMQP_PASS: "cm9ib3Nob3AxMjM="
---

# Creating a deployment for payment, and it will create a pod with payment container. We set environment variables for the application to connect to cart, user and rabbitmq services.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  # deployment labels
  labels:
    component: payment
    project: roboshop
    tier: app
spec:
  replicas: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: payment
      project: roboshop
      tier: app
  # This is pod definition
  template:
    metadata:
      labels:
        component: payment
        project: roboshop
        tier: app
    spec:
      containers:
      - name: payment
        image: rachelsigao/payment:v1
        envFrom:
        - configMapRef:
            name: payment
        - secretRef:
            name: payment
---

# Creating a service to expose the payment application on port 8080, and it will route traffic to the pods with matching labels.
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    component: payment
    project: roboshop
    tier: app
spec:
  selector:
    component: payment
    project: roboshop
    tier: app
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port